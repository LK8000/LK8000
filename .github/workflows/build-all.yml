# Build LK8000 solo per Linux
# Ricompila solo i file modificati (cache Bin/ per build incrementale)
# Parte solo quando cambiano sorgenti/build

name: Build Linux

on:
  push:
    branches: [ master, feature/approach ]
    paths:
      - 'Common/**'
      - 'Makefile'
      - 'build/**'
      - 'lib/**'
      - '.github/workflows/build-all.yml'
  pull_request:
    branches: [ master, feature/approach ]
    paths:
      - 'Common/**'
      - 'Makefile'
      - 'build/**'
      - 'lib/**'
      - '.github/workflows/build-all.yml'
  workflow_dispatch:

jobs:
  build:
    name: Linux
    runs-on: ubuntu-24.04
    container:
      image: lk8000/lk8000:build
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache per build incrementale: riusa Bin/ del run precedente,
      # make ricompila solo i file modificati
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: Bin
          key: build-linux-${{ github.ref }}

      - name: Install missing deps (libjpeg in container)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends libjpeg-dev

      - name: Build LINUX (incrementale)
        working-directory: ${{ github.workspace }}
        run: make -j2 TARGET=LINUX distrib

      - name: Upload LINUX artifact
        uses: actions/upload-artifact@v4
        with:
          name: LINUX-install
          path: LINUX-install.zip
